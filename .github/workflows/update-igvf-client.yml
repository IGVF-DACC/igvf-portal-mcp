name: Update igvf-client

on:
  schedule:
    - cron: '0 8 * * 5'  # Every Friday at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest igvf-client version from PyPI
        id: pypi
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/igvf-client/json | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current igvf-client version from requirements.txt
        id: current
        run: |
          CURRENT=$(grep '^igvf-client==' requirements.txt | cut -d'=' -f3)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Set git user identity
        run: |
          git config --global user.email "keenangraham@stanford.edu"
          git config --global user.name "Keenan Graham"

      - name: Update pinned igvf-client version in all files
        if: steps.pypi.outputs.version != steps.current.outputs.version
        run: |
          LATEST="${{ steps.pypi.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          sed -i "s/igvf-client==${CURRENT}/igvf-client==${LATEST}/g" requirements.txt
          sed -i "s/igvf-client==${CURRENT}/igvf-client==${LATEST}/g" server.py
          echo "$LATEST" > VERSION
          git add requirements.txt server.py VERSION
          git commit -m "update igvf-client to $LATEST"
          git push origin main
