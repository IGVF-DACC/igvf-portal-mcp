name: Update igvf-client

on:
  schedule:
    - cron: '0 8 * * 5'  # Every Friday at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest igvf-client version from PyPI
        id: pypi
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/igvf-client/json | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current igvf-client version from requirements.txt
        id: current
        run: |
          CURRENT=$(grep '^igvf-client==' requirements.txt | cut -d'=' -f3)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Set git user identity
        run: |
          git config --global user.email "keenangraham@stanford.edu"
          git config --global user.name "Keenan Graham"

      - name: Update pinned igvf-client version in all files
        if: steps.pypi.outputs.version != steps.current.outputs.version
        run: |
          LATEST="${{ steps.pypi.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          sed -i "s/igvf-client==${CURRENT}/igvf-client==${LATEST}/g" requirements.txt
          sed -i "s/igvf-client==${CURRENT}/igvf-client==${LATEST}/g" server.py
          echo "$LATEST" > VERSION

      - name: Create pull request
        id: create-pr
        if: steps.pypi.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update igvf-client to ${{ steps.pypi.outputs.version }}"
          title: "chore: update igvf-client to ${{ steps.pypi.outputs.version }}"
          body: |
            Automated dependency update: `igvf-client` `${{ steps.current.outputs.version }}` → `${{ steps.pypi.outputs.version }}`.

            MCP server version updated to match.

            See https://pypi.org/project/igvf-client/${{ steps.pypi.outputs.version }}/
          branch: "update-igvf-client-${{ steps.pypi.outputs.version }}"
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
